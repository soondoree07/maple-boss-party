<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0c14">
  <title>메이플 보스 파티 기록</title>

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <link rel="stylesheet" href="css/style.css">
  <script>
    // 무드 <link>를 style.css 뒤에 얹어 :root만 덮어쓴다(구조/클래스/JS 불변).
    // 첫 페인트는 항상 파티 선택 화면(진입 가드가 #/ 로 강제)이라 랜덤 픽으로 시작.
    // 파티 안에서는 app.js가 유저 선택 무드로 href만 교체한다(js/mood.js).
    (function () {
      var moods = [1, 2, 3, 4, 5, 6];
      var pick = moods[Math.floor(Math.random() * moods.length)];
      window.__moodRandomId = pick;
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.id = 'mood-theme-link';
      link.href = 'css/themes/mood-' + pick + '.css';
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
