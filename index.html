<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0c14">
  <title>메이플 보스 파티 기록</title>

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <link rel="stylesheet" href="css/style.css">
  <script>
    // 방문(로드)마다 무드 6벌 중 1벌을 랜덤으로 적용한다.
    // style.css 뒤에 :root 오버라이드 <link>를 얹어 색만 덮어쓴다(구조/클래스/JS 불변).
    (function () {
      var moods = [1, 2, 3, 4, 6, 8];
      var pick = moods[Math.floor(Math.random() * moods.length)];
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'css/themes/mood-' + pick + '.css';
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
